<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - KUET Adventure Club</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body class="admin-body dashboard-body">
    <header class="dashboard-header">
        <h2>Admin Dashboard</h2>
        <button id="logoutBtn" class="logout-btn">Logout</button>
    </header>
    <main class="dashboard-main">
        <h3>Submitted Registrations</h3>
        <div class="table-container">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Full Name</th>
                        <th>Student ID</th>
                        <th>Dept</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Interest</th>
                        <th>Message</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Data will be loaded dynamically -->
                </tbody>
            </table>
        </div>

        <h3 style="margin-top: 40px; text-align: center; color: #2c3e50;">Edit Site Content</h3>
        <div class="form-container" style="max-width: 600px; margin: 20px auto; padding: 20px; background-color: #fff; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
            <form id="siteContentForm">
                <div class="form-group" style="margin-bottom: 15px;">
                    <label for="aboutUsText" style="display: block; margin-bottom: 5px; color: #333; font-weight: bold;">About Us Text</label>
                    <textarea id="aboutUsText" name="aboutUsText" rows="4" required style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #ccc; color: #333;"></textarea>
                </div>
                <div class="form-group" style="margin-bottom: 15px;">
                    <label for="contactEmail" style="display: block; margin-bottom: 5px; color: #333; font-weight: bold;">Contact Email</label>
                    <input type="email" id="contactEmail" name="contactEmail" required style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #ccc; color: #333;">
                </div>
                <div class="form-group" style="margin-bottom: 15px;">
                    <label for="contactLocation" style="display: block; margin-bottom: 5px; color: #333; font-weight: bold;">Contact Location</label>
                    <input type="text" id="contactLocation" name="contactLocation" required style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #ccc; color: #333;">
                </div>
                <button type="submit" class="submit-btn" style="width: 100%; padding: 10px; background-color: #2c3e50; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px;">Save Change</button>
                <div id="contentUpdateMsg" class="hidden" style="margin-top: 15px; text-align: center;"></div>
            </form>
        </div>
        <p id="dashboardError" class="error-msg hidden">Failed to load data. Please make sure you are logged in.</p>
    </main>
    <script src="admin.js" defer></script>
</body>
</html>
